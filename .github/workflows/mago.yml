name: Mago (Code Quality Checks, Non Blocking)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  mago:
    name: Mago Quality Checks
    runs-on: ubuntu-latest
    # Reports failure but does not block the "Merge" button
    continue-on-error: true 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Mago
        uses: actions/cache@v4
        with:
          path: .mago
          key: ${{ runner.os }}-mago-${{ hashFiles('mago.toml') }}
          restore-keys: |
            ${{ runner.os }}-mago-

      - name: Setup Mago
        uses: nhedger/setup-mago@v1
        with:
          version: "latest"
          token: ${{ github.token }}

      - name: Formatting
        run: mago fmt --check

      - name: Linting
        run: mago lint --reporting-format=github

      - name: Static Analysis
        run: mago analyze --reporting-format=github