name: Mago (Code Quality Checks, Non Blocking)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  mago:
    name: Mago Quality Checks
    runs-on: ubuntu-latest
    # Reports failure but does not block the "Merge" button
    continue-on-error: true 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Mago
        uses: actions/cache@v4
        with:
          path: .mago
          key: ${{ runner.os }}-mago-${{ hashFiles('mago.toml') }}
          restore-keys: |
            ${{ runner.os }}-mago-

      - name: Setup Mago
        uses: nhedger/setup-mago@v1
        with:
          version: "latest"
          token: ${{ github.token }}

      - name: Formatting
        id: format
        continue-on-error: true
        run: mago format --check

      - name: Linting
        id: lint
        continue-on-error: true
        run: mago lint --reporting-format=github

      - name: Static Analysis
        id: analyze
        continue-on-error: true
        run: mago analyze --reporting-format=github

      - name: Final status
        if: ${{ always() }}
        run: |
          if [[ "${{ steps.format.outcome }}" == "failure" || "${{ steps.lint.outcome }}" == "failure" || "${{ steps.analyze.outcome }}" == "failure" ]]; then
            echo "One or more Mago checks failed."
            echo "format=${{ steps.format.outcome }} lint=${{ steps.lint.outcome }} analyze=${{ steps.analyze.outcome }}"
            exit 1
          fi